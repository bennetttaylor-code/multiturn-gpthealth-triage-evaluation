name: Reproduce analysis

# Smoke test: re-run the full pipeline from the source data on every push / PR
# and confirm it exits cleanly and produces the workbook + key figures.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  reproduce:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # "lock": exact archived versions (requirements.lock) — proves the
        #         pinned environment reproduces published results.
        # "floor": latest versions satisfying requirements.txt floors —
        #          early warning that an upstream release breaks the pipeline.
        deps: [lock, floor]
    name: reproduce (${{ matrix.deps }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          if [ "${{ matrix.deps }}" = "lock" ]; then
            pip install -r requirements.lock
          else
            pip install -r requirements.txt
          fi

      - name: Run full pipeline
        run: python code/run_all.py --output ci_out

      - name: Verify expected outputs exist
        run: |
          set -e
          test -f ci_out/triage_analysis_results.xlsx
          for f in fig1_direction_by_dataset fig2_dist_comparisons \
                   fig3_cc_concordance fig4_promptcount_multiturn \
                   table1_descriptives extended_data_fig1_study_design \
                   extended_data_table1_prompt_derivation \
                   supp_table_grader_reliability; do
            test -f "ci_out/figures/$f.png"
            test -f "ci_out/figures/$f.pdf"
          done
          echo "All expected outputs present."

      - name: Upload regenerated outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results-${{ matrix.deps }}
          path: ci_out/
          retention-days: 7
